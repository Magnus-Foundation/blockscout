name: build-and-push

on:
  push:
    branches:
      - 'magnus/**'
    tags:
      - 'magnus-v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/blockscout

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REF="${GITHUB_REF#refs/heads/}"
          REF="${REF#refs/tags/}"
          REF="${REF//\//-}"   # magnus/foo -> magnus-foo
          SHA=$(git rev-parse --short HEAD)
          {
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE }}:${REF}"
            echo "tags_sha=${{ env.REGISTRY }}/${{ env.IMAGE }}:${REF}-${SHA}"
            echo "tags_latest=${{ env.REGISTRY }}/${{ env.IMAGE }}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.tags }}
            ${{ steps.tags.outputs.tags_sha }}
            ${{ steps.tags.outputs.tags_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BLOCKSCOUT_VERSION=magnus-${{ github.sha }}
            RELEASE_VERSION=11.0.2
